<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración</title>
    <!-- Cargamos el panel -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Este pequeño código le dice al panel cómo loguearse con GitHub
      window.CMS_MANUAL_INIT = true;
      document.addEventListener("DOMContentLoaded", function() {
        window.initCMS({
          config: {
            backend: {
              name: "github",
              repo: "mandaditos-envios/listapropiedades",
              branch: "main",
              base_url: "https://auth.decapcms.org" /* Servidor gratuito para iniciar sesión */
            },
            media_folder: "images",
            public_folder: "/images",
            collections: [
              {
                name: "propiedades",
                label: "Propiedades",
                folder: "_propiedades",
                create: true,
                slug: "{{slug}}",
                fields: [
                  { label: "Título", name: "title", widget: "string" },
                  { label: "Precio", name: "precio", widget: "string" },
                  { label: "Descripción", name: "body", widget: "markdown" },
                  { label: "Requisitos", name: "requisitos", widget: "list" },
                  { label: "Foto Principal", name: "thumbnail", widget: "image" }
                ]
              }
            ]
          }
        });
      });
    </script>
</head>
<body>
</body>
</html>
