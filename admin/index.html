<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Control - Mis Propiedades</title>
    <link rel="stylesheet" href="https://unpkg.com/@staticcms/core@^4.0.0/dist/main.css" />
</head>
<body>
    <script src="https://unpkg.com/@staticcms/core@^4.0.0/dist/static-cms-core.js"></script>
    <script>
        window.CMS_MANUAL_INIT = true;
        document.addEventListener("DOMContentLoaded", function() {
            window.initCMS({
                config: {
                    backend: {
                        name: "github",
                        repo: "mandaditos-envios/listapropiedades",
                        branch: "main",
                        gatekeeper_url: "https://api.staticcms.org" /* Servidor de acceso automático */
                    },
                    media_folder: "images",
                    public_folder: "/images",
                    collections: [
                        {
                            name: "propiedades",
                            label: "Propiedades",
                            folder: "_propiedades",
                            create: true,
                            slug: "{{slug}}",
                            fields: [
                                { label: "Título", name: "title", widget: "string" },
                                { label: "Precio", name: "precio", widget: "string" },
                                { label: "Descripción", name: "body", widget: "markdown" },
                                { label: "Requisitos", name: "requisitos", widget: "list" },
                                { label: "Foto Principal", name: "thumbnail", widget: "image" }
                            ]
                        }
                    ]
                }
            ]);
        });
    </script>
</body>
</html>
