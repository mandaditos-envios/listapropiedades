<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- MODIFICAR AQUÍ: El nombre que aparece en la pestaña de tu web -->
    <title>Catálogo Inmobiliario</title>
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #25d366;
            --text-main: #334155;
            --text-muted: #64748b;
            --bg: #f8fafc;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        header { max-width: 1100px; margin: 0 auto; padding: 60px 20px 30px 20px; text-align: left; }
        header h1 { font-size: 32px; font-weight: 800; color: var(--primary); margin: 0 0 8px 0; letter-spacing: -0.5px; }
        header p { font-size: 16px; color: var(--text-muted); margin: 0; }
        .grid { max-width: 1100px; margin: 0 auto; padding: 0 20px 60px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .tarjeta-link { text-decoration: none; color: inherit; }
        .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04); border: 1px solid #e2e8f0; transition: transform 0.2s ease, box-shadow 0.2s ease; display: flex; flex-direction: column; height: 100%; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); }
        .img-contenedor { position: relative; width: 100%; height: 220px; background: #e2e8f0; }
        .foto { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 15px; left: 15px; background: rgba(15, 23, 42, 0.85); color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; backdrop-filter: blur(4px); }
        .info { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .precio { font-size: 24px; font-weight: 700; color: var(--primary); margin: 0 0 6px 0; }
        .titulo { font-size: 18px; font-weight: 600; color: var(--primary); margin: 0 0 10px 0; line-height: 1.4; }
        .detalles { font-size: 14px; color: var(--text-muted); margin-bottom: 0; display: flex; gap: 15px; }
    </style>
</head>
<body>

    <!-- 📢 [ENCABEZADO DE LA WEB] MODIFICAR AQUÍ -->
    <header>
        <h1>Propiedades Destacadas</h1>
        <p>Explorá nuestro catálogo exclusivo. Hacé clic en cualquier propiedad para ver los detalles completos.</p>
    </header>

    <div class="grid">

        <!-- ======================================================================= -->
        <!-- 🏢 [TARJETA DE PROPIEDAD 1] INICIO -->
        <!-- En 'href=' ponés el nombre exacto de la página individual de esta propiedad -->
        <a href="Marwa.html" class="tarjeta-link">
            <div class="card">
                <div class="img-contenedor">
                    <!-- Podés cambiar 'Alquiler' por 'Venta' o 'Reservado' -->
                    <span class="badge">Alquiler</span>
                    
                    <!-- 📸 Cambiá 'foto-palermo.jpg' por la foto que subiste para la miniatura -->
                    <img class="foto" src="marwa1.jpg" alt="Foto miniatura">
                </div>
                <div class="info">
                    <div>
                        <!-- 💰 Modificá el precio aquí -->
                        <p class="precio">$ 450.000 <span style="font-size: 14px; font-weight: 400; color: var(--text-muted);">/ mes</span></p>
                        
                        <!-- 🏷️ Modificá el título de la tarjeta aquí -->
                        <h2 class="titulo">Depto 2 Ambientes con Balcón</h2>
                    </div>
                    <div class="detalles">
                        <!-- 📍 Ubicación corta y datos rápidos -->
                        <span>📍 Palermo, CABA</span>
                        <span>🛏️ 1 Dorm.</span>
                    </div>
                </div>
            </div>
        </a>
        <!-- 🏢 [TARJETA DE PROPIEDAD 1] FIN -->
        <!-- ======================================================================= -->


        <!-- ======================================================================= -->
        <!-- 🏡 [TARJETA DE PROPIEDAD 2] INICIO -->
        <a href="colegiales.html" class="tarjeta-link">
            <div class="card">
                <div class="img-contenedor">
                    <span class="badge">Alquiler</span>
                    
                    <!-- 📸 Foto de la segunda propiedad -->
                    <img class="foto" src="ph-colegiales.jpg" alt="Foto miniatura">
                </div>
                <div class="info">
                    <div>
                        <!-- 💰 Precio -->
                        <p class="precio">$ 600.000 <span style="font-size: 14px; font-weight: 400; color: var(--text-muted);">/ mes</span></p>
                        
                        <!-- 🏷️ Título -->
                        <h2 class="titulo">Casa PH 3 Ambientes con Patio</h2>
                    </div>
                    <div class="detalles">
                        <!-- 📍 Datos rápidos -->
                        <span>📍 Colegiales, CABA</span>
                        <span>🛏️ 2 Dorm.</span>
                    </div>
                </div>
            </div>
        </a>
        <!-- 🏡 [TARJETA DE PROPIEDAD 2] FIN -->
        <!-- ======================================================================= -->


        <!-- 💡 TIP PARA EL FUTURO: Si querés agregar una Propiedad 3, solo tenés que 
             copiar todo el bloque desde donde dice 'INICIO' hasta donde dice 'FIN' 
             y pegarlo justo acá abajo, cambiando los datos por los de la nueva propiedad. -->

    </div>

</body>
</html>
