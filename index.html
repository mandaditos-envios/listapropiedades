<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortes Propiedades - Sistema</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: sans-serif; background-color: var(--bg); padding: 20px; color: #334155; }
        .contenedor { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .campo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .resultado-box { background: #0f172a; color: white; padding: 20px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; margin-top: 20px; }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>CORTES PROPIEDADES</h1>

    <div class="campo">
        <label>Nombre del Edificio:</label>
        <input type="text" id="nombre_edificio" oninput="generarFicha()">
    </div>

    <div class="campo">
        <label>Operación:</label>
        <select id="operacion" onchange="generarFicha()">
            <option value="Alquiler">Alquiler</option>
            <option value="Venta">Venta</option>
        </select>
    </div>

    <div class="campo">
        <label>Valor ($):</label>
        <input type="number" id="valor" oninput="generarFicha()">
    </div>

    <div class="campo">
        <label>Título:</label>
        <input type="text" id="titulo_auto" readonly style="background: #e2e8f0;">
    </div>

    <h2>Vista previa</h2>
    <div id="resultado" class="resultado-box">Esperando datos...</div>
    <button class="btn btn-primary" onclick="copiarTexto()">Copiar Ficha</button>
</div>

<script>
    function generarFicha() {
        try {
            const edif = document.getElementById('nombre_edificio').value;
            const op = document.getElementById('operacion').value;
            const val = document.getElementById('valor').value;

            // Generar título
            const titulo = `Propiedad en ${op} - ${edif || 'Sin nombre'}`;
            document.getElementById('titulo_auto').value = titulo;

            // Generar cuerpo
            const texto = `🏢 CORTES PROPIEDADES\n\n` +
                          `📌 ${titulo}\n` +
                          `💰 Valor: $${val || '0'}\n` +
                          `--------------------------\n` +
                          `Generado automáticamente.`;

            document.getElementById('resultado').innerText = texto;
        } catch (e) {
            console.error("Error al generar:", e);
        }
    }

    function copiarTexto() {
        const texto = document.getElementById('resultado').innerText;
        navigator.clipboard.writeText(texto).then(() => {
            alert("¡Copiado!");
        });
    }

    // Inicializar al cargar
    window.onload = generarFicha;
</script>

</body>
</html>
