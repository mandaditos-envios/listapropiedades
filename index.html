<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Fichas Inmobiliarias</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #25d366;
            --bg: #f8fafc;
            --border: #cbd5e1;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: #334155; margin: 0; padding: 20px; }
        .contenedor { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(15, 23, 42, 0.05); }
        h1 { font-size: 24px; color: var(--primary); margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        h2 { font-size: 18px; color: var(--primary); margin-bottom: 10px; }
        .campo { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--primary); }
        input[type="text"], input[type="number"], textarea, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 100px; resize: vertical; }
        .opciones-inline { display: flex; gap: 20px; margin-top: 5px; }
        .opciones-inline label { font-weight: normal; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        
        /* Contenedor del texto generado */
        .resultado-box { background: #0f172a; color: #f8fafc; padding: 20px; border-radius: 12px; font-family: 'Courier New', Courier, monospace; font-size: 14px; white-space: pre-wrap; line-height: 1.5; margin-top: 15px; border: 1px solid #334155; }
        
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .btn:hover { background: #1e293b; }
        .btn-copiar { background: var(--accent); color: white; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-copiar:hover { background: #1ebd58; }
        
        .galeria-previa { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .galeria-previa img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>📝 Generador de Fichas para WhatsApp</h1>
    
    <!-- Formulario de Entrada -->
    <div class="campo">
        <label for="nombre">Nombre interno de la propiedad (Para guardar borrador):</label>
        <input type="text" id="nombre" placeholder="Ej: Casa Marva, Depto Palermo" oninput="actualizarTodo()">
    </div>

    <div class="campo">
        <label>Tipo de operación:</label>
        <div class="opciones-inline">
            <label><input type="radio" name="tipo" value="Alquiler" checked onchange="actualizarTodo()"> 🔑 Alquiler</label>
            <label><input type="radio" name="tipo" value="Venta" onchange="actualizarTodo()"> 💰 Venta</label>
        </div>
    </div>

    <div class="campo">
        <label for="titulo">Título comercial para el cliente:</label>
        <input type="text" id="titulo" placeholder="Ej: Hermosa Casa 3 Ambientes con Patio" oninput="actualizarTodo()">
    </div>

    <div class="campo">
        <label for="precio">Precio:</label>
        <input type="text" id="precio" placeholder="Ej: $ 500.000 / mes o U$S 85.000" oninput="actualizarTodo()">
    </div>

    <div class="campo">
        <label for="ubicacion">Ubicación / Barrio:</label>
        <input type="text" id="ubicacion" placeholder="Ej: Zona Centro, Posadas" oninput="actualizarTodo()">
    </div>

    <div class="campo">
        <label for="descripcion">Descripción de la propiedad:</label>
        <textarea id="descripcion" placeholder="Contá acá los detalles: ambientes, cochera, luminosidad..." oninput="actualizarTodo()"></textarea>
    </div>

    <div class="campo">
        <label for="requisitos">Requisitos / Condiciones:</label>
        <textarea id="requisitos" placeholder="Ej: - Mes de adelanto&#10;- Mes de depósito&#10;- Recibo de sueldo" oninput="actualizarTodo()"></textarea>
    </div>

    <div class="campo">
        <label for="fotos">Seleccionar fotos (se incluirán como links de referencia abajo):</label>
        <input type="file" id="fotos" multiple accept="image/*" onchange="procesarFotos()">
        <div class="galeria-previa" id="galeriaPrevia"></div>
    </div>

    <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 30px 0;">

    <!-- Sección de Salida (Transcripción) -->
    <h2>📋 Vista Previa de la Ficha (Formato WhatsApp)</h2>
    <div class="resultado-box" id="resultadoTexto">Completá los campos de arriba para generar la ficha...</div>
    
    <button class="btn btn-copiar" onclick="copiarTexto()">
        📋 Copiar Ficha Lista para Enviar
    </button>
</div>

<script>
    let nombresFotos = [];

    // Esta función junta todos los datos y escribe el texto abajo
    function actualizarTodo() {
        const nombreProp = document.getElementById('nombre').value || 'Sin Nombre';
        const tipoOp = document.querySelector('input[name="tipo"]:checked').value;
        const titulo = document.getElementById('titulo').value || '[Sin título]';
        const precio = document.getElementById('precio').value || '[Sin precio]';
        const ubicacion = document.getElementById('ubicacion').value || '[Sin ubicación]';
        const descripcion = document.getElementById('descripcion').value || '[Sin descripción]';
        const requisitos = document.getElementById('requisitos').value || '[Sin requisitos]';

        // Estructura limpia y vendedora con emojis para WhatsApp
        let textoFinal = `🏠 *NUEVA PROPIEDAD DISPONIBLE* 🏠\n`;
        textoFinal += `✨ *${titulo}* (${tipoOp})\n\n`;
        textoFinal += `💵 *Precio:* ${precio}\n`;
        textoFinal += `📍 *Ubicación:* ${ubicacion}\n\n`;
        textoFinal += `📝 *Descripción:* \n${descripcion}\n\n`;
        textoFinal += `📋 *Requisitos / Condiciones:* \n${requisitos}\n`;

        // Si subiste fotos, agrega los nombres de los archivos para que el cliente sepa cuáles son
        if (nombresFotos.length > 0) {
            textoFinal += `\n📸 *Fotos adjuntas:* ${nombresFotos.join(', ')}\n`;
        }
        
        textoFinal += `\n📲 _¿Te interesa? ¡Consultame para coordinar una visita!_`;

        document.getElementById('resultadoTexto').innerText = textoFinal;

        // Guardar borrador automático en el navegador usando el nombre de la propiedad
        const datosBorrador = { tipoOp, titulo, precio, ubicacion, descripcion, requisitos };
        localStorage.setItem('borrador_' + nombreProp, JSON.stringify(datosBorrador));
    }

    // Procesa las fotos que subís solo para mostrar la miniatura abajo y sacar el nombre
    function procesarFotos() {
        const input = document.getElementById('fotos');
        const galeria = document.getElementById('galeriaPrevia');
        galeria.innerHTML = '';
        nombresFotos = [];

        if (input.files) {
            Array.from(input.files).forEach(file => {
                nombresFotos.push(file.name);
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    galeria.appendChild(img);
                }
                reader.readAsDataURL(file);
            });
        }
        actualizarTodo();
    }

    // Función del botón que copia el texto al portapapeles automáticamente
    function copiarTexto() {
        const texto = document.getElementById('resultadoTexto').innerText;
        
        if(texto.includes("Completá los campos")) {
            alert("Primero escribe algo de información.");
            return;
        }

        navigator.clipboard.writeText(texto).then(() => {
            alert("¡Ficha copiada con éxito! Ya podés ir a WhatsApp y pegarla.");
        }).catch(err => {
            alert("Hubo un error al copiar el texto automáticamente. Seleccionalo manualmente.");
        });
    }
</script>

</body>
</html>
